<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 470" width="740" height="470">
  <defs>
    <linearGradient id="cardFront" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132a5c"/>
      <stop offset="100%" stop-color="#0b1c40"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1c3f7a"/>
      <stop offset="100%" stop-color="#4fd6e8"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- shadows -->
  <ellipse cx="400" cy="300" rx="150" ry="24" fill="#0b1c40" opacity="0.16" filter="url(#soft)"/>
  <ellipse cx="150" cy="430" rx="90" ry="16" fill="#0b1c40" opacity="0.14" filter="url(#soft)"/>
  <ellipse cx="600" cy="150" rx="60" ry="14" fill="#0b1c40" opacity="0.14" filter="url(#soft)"/>

  <!-- report card (back panel) -->
  <rect x="255" y="95" width="270" height="180" rx="16" fill="#c9d4e3" transform="rotate(-8 390 185)"/>

  <!-- report card (front panel) -->
  <g transform="rotate(-8 380 175)">
    <rect x="225" y="75" width="270" height="180" rx="16" fill="url(#cardFront)"/>
    <!-- small tab indicators -->
    <rect x="248" y="105" width="26" height="6" rx="3" fill="#4fd6e8"/>
    <rect x="248" y="150" width="26" height="6" rx="3" fill="#5b9ee6"/>
    <rect x="248" y="195" width="26" height="6" rx="3" fill="#8fd8ff"/>
    <!-- feedback trend waves -->
    <path d="M290 118 Q320 95 350 118 T410 118 T470 118" fill="none" stroke="#4fd6e8" stroke-width="6" stroke-linecap="round"/>
    <path d="M290 163 Q320 140 350 163 T410 163 T470 163" fill="none" stroke="#5b9ee6" stroke-width="6" stroke-linecap="round"/>
    <path d="M290 208 Q320 185 350 208 T410 208 T470 208" fill="none" stroke="#8fd8ff" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- magnifying glass over the report -->
  <circle cx="560" cy="150" r="42" fill="none" stroke="#2fd0e8" stroke-width="13"/>
  <rect x="587" y="182" width="18" height="58" rx="9" fill="#2fd0e8" transform="rotate(42 596 211)"/>

  <!-- customer/persona icons -->
  <g>
    <circle cx="95" cy="120" r="16" fill="#0b1c40"/>
    <path d="M70 168 q25 -30 50 0 z" fill="#0b1c40"/>
  </g>
  <g>
    <circle cx="140" cy="112" r="16" fill="#3f6fc4"/>
    <path d="M115 160 q25 -30 50 0 z" fill="#3f6fc4"/>
  </g>
  <g>
    <circle cx="185" cy="120" r="16" fill="#8fd8ff"/>
    <path d="M160 168 q25 -30 50 0 z" fill="#8fd8ff"/>
  </g>

  <!-- insight datapoints -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#3a4a6b">
    <circle cx="600" cy="245" r="7" fill="none" stroke="#2fd0e8" stroke-width="3"/>
    <text x="618" y="250">Insight 1</text>

    <circle cx="620" cy="285" r="7" fill="none" stroke="#5b9ee6" stroke-width="3"/>
    <text x="638" y="290">Insight 2</text>

    <circle cx="600" cy="325" r="7" fill="none" stroke="#3f6fc4" stroke-width="3"/>
    <text x="618" y="330">Insight 3</text>
  </g>

  <!-- feedback volume bar chart -->
  <g transform="rotate(-6 150 400)">
    <rect x="90"  y="380" width="14" height="45" rx="3" fill="url(#barGrad)"/>
    <rect x="110" y="360" width="14" height="65" rx="3" fill="url(#barGrad)"/>
    <rect x="130" y="340" width="14" height="85" rx="3" fill="url(#barGrad)"/>
    <rect x="150" y="368" width="14" height="57" rx="3" fill="url(#barGrad)"/>
    <rect x="170" y="350" width="14" height="75" rx="3" fill="url(#barGrad)"/>
    <rect x="190" y="390" width="14" height="35" rx="3" fill="url(#barGrad)"/>
  </g>

  <!-- synthesized-insight hub badge -->
  <circle cx="600" cy="400" r="34" fill="#0b1c40"/>
  <circle cx="600" cy="400" r="34" fill="none" stroke="#2fd0e8" stroke-width="4" stroke-dasharray="6 6"/>
  <circle cx="600" cy="400" r="12" fill="#4fd6e8"/>
</svg>
