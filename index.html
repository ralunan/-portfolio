<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronald Alunan - UX Design Portfolio</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body data-route="home">
    <nav id="site-nav"><a href="#/">RA &mdash; Home</a></nav>
    <div id="commit-counter">Total Commits &mdash;</div>

    <div id="app">
        <section id="screen-home" class="screen" data-screen="home">
            <div class="screen-content home-hero">
                <div class="home-kicker">UX Design Portfolio</div>
                <h1 class="home-title">
                    <span class="home-title-line">Hi, I'm</span>
                    <span class="home-title-name">Ronald<br>Alunan</span>
                </h1>
                <nav class="home-nav">
                    <a href="#/resume">Resume</a>
                    <a href="#/about">About Me</a>
                    <a href="#/projects">Projects</a>
                </nav>
            </div>
        </section>

        <section id="screen-resume" class="screen" data-screen="resume">
            <div class="screen-content screen-content--wide"></div>
        </section>

        <section id="screen-about" class="screen" data-screen="about">
            <div class="screen-content screen-content--about"></div>
        </section>

        <section id="screen-projects" class="screen" data-screen="projects">
            <div class="screen-content screen-content--wide">
                <h1 class="projects-heading">Walmart Projects</h1>
                <div id="projects-list" class="project-card-list"></div>
            </div>
        </section>

        <section id="screen-project" class="screen" data-screen="project">
            <div class="screen-content screen-content--project"></div>
        </section>
    </div>

    <div id="lightbox" class="lightbox">
        <button type="button" class="lightbox-close" aria-label="Close">&times;</button>
        <img class="lightbox-img" src="" alt="">
    </div>

    <div id="add-project-modal" class="modal">
        <div class="modal-content">
            <button type="button" class="modal-close" aria-label="Close">&times;</button>
            <p class="modal-text">Design is always needed! If you want to collaborate together on my next project, please contact me through LinkedIn or my contact info.</p>
            <a class="modal-cta" href="#/resume">View Resume</a>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
